name: Package Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p /tmp/ralph-loop/src
          cp src/index.js /tmp/ralph-loop/src/
          cp package.json /tmp/ralph-loop/
          cp README.md /tmp/ralph-loop/
          cp LICENSE /tmp/ralph-loop/ 2>/dev/null || true
          tar czf "ralph-loop-${VERSION}.tar.gz" -C /tmp ralph-loop

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "ralph-loop-${VERSION}.tar.gz" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes
