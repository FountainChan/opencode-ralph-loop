name: Package Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package tarball
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          mkdir -p /tmp/ralph-loop/src
          cp src/index.js /tmp/ralph-loop/src/
          cp package.json /tmp/ralph-loop/
          cp README.md /tmp/ralph-loop/
          cp LICENSE /tmp/ralph-loop/ 2>/dev/null || true
          tar czf "ralph-loop-${VERSION}.tar.gz" -C /tmp ralph-loop

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "ralph-loop-${VERSION}.tar.gz" \
            --repo "${{ github.repository }}"
